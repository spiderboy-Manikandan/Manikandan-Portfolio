<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Vibrant Gradient -->
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#ff2a85" />
    </linearGradient>
    <filter id="cyberGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer double-ring tech gear/hexagon outline -->
  <polygon points="50,4 88,26 88,74 50,96 12,74 12,26" 
           fill="none" 
           stroke="url(#cyberGrad)" 
           stroke-width="3" 
           filter="url(#cyberGlow)" />
           
  <polygon points="50,10 82,29 82,71 50,90 18,71 18,29" 
           fill="none" 
           stroke="url(#cyberGrad)" 
           stroke-width="1" 
           stroke-dasharray="4,4" 
           opacity="0.7" />
           
  <!-- Code brackets: < and > -->
  <path d="M 32,38 L 18,50 L 32,62" fill="none" stroke="#00ffb3" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#cyberGlow)" />
  <path d="M 68,38 L 82,50 L 68,62" fill="none" stroke="#ff2a85" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" filter="url(#cyberGlow)" />
  
  <!-- Stylized M letter -->
  <path d="M 38,62 L 38,38 L 50,52 L 62,38 L 62,62" 
        fill="none" 
        stroke="url(#cyberGrad)" 
        stroke-width="4.5" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        filter="url(#cyberGlow)" />
</svg>
