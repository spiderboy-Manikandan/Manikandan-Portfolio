<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificates | Manikandan B</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.6.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="theme-skills">
  <div id="scrollBar"></div>
  <canvas id="bgCanvas"></canvas>
  <button id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top">
    <i class="fas fa-arrow-up"></i>
  </button>

  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand logo d-flex align-items-center gap-2" href="index.html#home">
        <img src="images/logo.svg" alt="MB Logo" style="height: 38px; width: 38px; filter: drop-shadow(0 0 4px var(--pink));" />
        <span style="font-family:'JetBrains Mono',monospace; font-weight:800; font-size: 20px; color:var(--text);">Mani<span style="color:var(--cyan)">kandan</span></span>
      </a>
      <div class="d-flex align-items-center order-lg-last gap-2">
        <button id="themeToggle" class="theme-btn" aria-label="Toggle Theme System">
          <i class="fas fa-moon"></i>
        </button>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Toggle Menu">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#about">About</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#education">Education</a></li>
          <li class="nav-item"><a class="nav-link active" href="#certificates">Certificates</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#projects">Projects</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#skills">Skills</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main>
    <section id="certificates" class="certificate-page">
      <div class="container">
        <div class="certificate-photo-grid reveal">
          <button class="certificate-photo-card" type="button" data-full="images/cert-html.png" aria-label="View HTML certificate">
            <img src="images/cert-html.png" alt="HTML certificate" />
          </button>
          <button class="certificate-photo-card" type="button" data-full="images/cert-css.png" aria-label="View CSS certificate">
            <img src="images/cert-css.png" alt="CSS certificate" />
          </button>
          <button class="certificate-photo-card" type="button" data-full="images/cert-python.png" aria-label="View Python certificate">
            <img src="images/cert-python.png" alt="Python certificate" />
          </button>
          <button class="certificate-photo-card" type="button" data-full="images/cert-nm.png" aria-label="View NM certificate">
            <img src="images/cert-nm.png" alt="NM certificate" />
          </button>
          <button class="certificate-photo-card" type="button" data-full="images/cert-nm-1.png" aria-label="View NM certificate 1">
            <img src="images/cert-nm-1.png" alt="NM certificate 1" />
          </button>
          <button class="certificate-photo-card" type="button" data-full="images/cert-nm-2.png" aria-label="View NM certificate 2">
            <img src="images/cert-nm-2.png" alt="NM certificate 2" />
          </button>
          <button class="certificate-photo-card" type="button" data-full="images/cert-nm-3.png" aria-label="View NM certificate 3">
            <img src="images/cert-nm-3.png" alt="NM certificate 3" />
          </button>
        </div>
      </div>
    </section>
  </main>

  <div class="certificate-lightbox" id="certificateLightbox" aria-hidden="true">
    <button class="certificate-lightbox-close" type="button" aria-label="Close certificate preview">
      <i class="fas fa-times"></i>
    </button>
    <img id="certificateLightboxImage" src="" alt="" />
  </div>

  <footer>
    <div class="container">
      <p>Crafted with <span>❤️</span> by <span>Manikandan B</span> &nbsp;|&nbsp; © 2026 All rights reserved.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>

</html>
